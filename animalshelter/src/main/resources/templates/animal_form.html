<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Animal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/animals" class="active">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/habitats">Hábitats</a>
        </div>

        <div class="form-container">
            <h1 style="margin-bottom: 25px; font-size: 1.75rem;">Detalles del Animal</h1>

            <form th:action="@{/animals/save}" th:object="${animal}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{entryDate}">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" th:field="*{name}" required placeholder="Ej. Luna">
                </div>
                
                <div class="form-group">
                    <label>Especie:</label>
                    <input type="text" th:field="*{species}" required placeholder="Ej. Gato">
                </div>
                
                <div class="form-group">
                    <label>Edad:</label>
                    <input type="number" th:field="*{age}" required min="0">
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" th:field="*{adopted}">
                    <label>¿Está adoptado?</label>
                </div>

                <div class="form-actions">
                    <a href="/animals" class="btn btn-outline">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Animal</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
