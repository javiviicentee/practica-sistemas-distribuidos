<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Animal Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { margin-left: 15px; color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Animal Details</h1>

    <form th:action="@{/animals/save}" th:object="${animal}" method="post">
        
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Name:</label>
            <input type="text" th:field="*{name}" required placeholder="e.g. Luna">
        </div>
        
        <div class="form-group">
            <label>Species:</label>
            <input type="text" th:field="*{species}" required placeholder="e.g. Cat">
        </div>
        
        <div class="form-group">
            <label>Age:</label>
            <input type="number" th:field="*{age}" required min="0">
        </div>
        
        <div class="form-group">
            <label>Is Adopted?:</label>
            <input type="checkbox" th:field="*{adopted}">
        </div>

        <button type="submit">Save Animal</button>
        <a href="/animals">Cancel</a>
    </form>

</body>
</html>
