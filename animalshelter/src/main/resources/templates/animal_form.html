<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Animal</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/animals" class="active">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/refuges">Refugios</a>
        </div>

        <div class="form-container">
            <h1 style="margin-bottom: 25px; font-size: 1.75rem;">Detalles del Animal</h1>

            <form th:action="@{/animals/save}" th:object="${animal}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{entryDate}">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" th:field="*{name}" required placeholder="Ej. Luna">
                </div>
                
                <div class="form-group">
                    <label>Especie:</label>
                    <select th:field="*{species}" id="speciesSelect" required>
                        <option value="">-- Selecciona Especie --</option>
                        <option th:each="specie : ${speciesList}"
                                th:value="${specie}"
                                th:text="${specie.name()}"></option>
                    </select>
                </div>

                <div class="form-group" id="customSpeciesDiv" style="display: none;">
                    <label>Especie (Otra):</label>
                    <input type="text" th:field="*{customSpecies}" id="customSpeciesInput" placeholder="Ej. Huron">
                </div>
                
                <div class="form-group">
                    <label>Edad:</label>
                    <input type="number" th:field="*{age}" required min="0">
                </div>
                
                <div class="form-actions">
                    <a href="/animals" class="btn btn-outline">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Animal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var speciesSelect = document.getElementById('speciesSelect');
            var customSpeciesDiv = document.getElementById('customSpeciesDiv');
            var customSpeciesInput = document.getElementById('customSpeciesInput');

            function toggleCustomSpecies() {
                if (speciesSelect.value === 'OTRO') {
                    customSpeciesDiv.style.display = 'block';
                    customSpeciesInput.setAttribute('required', 'required');
                } else {
                    customSpeciesDiv.style.display = 'none';
                    customSpeciesInput.removeAttribute('required');
                    customSpeciesInput.value = '';
                }
            }

            speciesSelect.addEventListener('change', toggleCustomSpecies);
            toggleCustomSpecies();
        });
    </script>
    
    <footer>
        <p>&copy; 2026 Refugio Patitas - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
