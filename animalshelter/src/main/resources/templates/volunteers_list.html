<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refugio - Voluntarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 40px;">🐾</span>
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/animals">Animales</a>
            <a href="/volunteers" class="active">Voluntarios</a>
            <a href="/habitats">Hábitats</a>
        </div>

        <div class="page-header">
            <h1>Equipo de Voluntarios</h1>
            <a href="/volunteers/new" class="btn btn-primary">+ Añadir Nuevo Voluntario</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="volunteer : ${volunteers}">
                        <td th:text="${volunteer.id}">1</td>
                        <td th:text="${volunteer.name}">Ana</td>
                        <td th:text="${volunteer.email}">ana@email.com</td>
                        <td th:text="${volunteer.role}">Paseador</td>
                        <td>
                            <span th:classappend="${volunteer.active} ? 'status-badge yes' : 'status-badge no'"
                                  th:text="${volunteer.active ? 'Sí' : 'No'}">Sí</span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn btn-sm btn-outline" th:href="@{/volunteers/edit/{id}(id=${volunteer.id})}">Editar</a>
                                
                                <form th:action="@{/volunteers/delete/{id}(id=${volunteer.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                                </form>
                                
                                <form th:action="@{/volunteers/{id}/toggle-status(id=${volunteer.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-warning">Cambiar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
