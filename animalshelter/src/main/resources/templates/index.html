<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refugio - Panel Principal</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .card-title {
            color: #64748b;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .card-value {
            font-size: 36px;
            font-weight: 700;
            color: #0f172a;
        }
        .hero-section {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .hero-section h1 {
            margin: 0 0 10px 0;
            font-size: 32px;
            color: white;
        }
        .hero-section p {
            margin: 0;
            font-size: 18px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-links">
            <a href="/" class="active">Inicio</a>
            <a href="/animals">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/refuges">Refugios</a>
        </div>

        <div class="hero-section">
            <h1>Bienvenido a Refugio Patitas</h1>
            <p>Sistema Integral de Gestión y Adopción</p>
        </div>

        <div class="page-header">
            <h2>Resumen del Refugio</h2>
        </div>

        <div class="dashboard-grid">
            <a href="/animals" style="text-decoration: none;">
                <div class="card">
                    <img src="/images/paw.png" alt="Icono Animal" style="width: 64px; height: 64px; margin-bottom: 15px;">
                    <div class="card-title">Animales Registrados</div>
                    <div class="card-value" th:text="${animalsCount}">0</div>
                </div>
            </a>
            
            <a href="/volunteers" style="text-decoration: none;">
                <div class="card">
                    <img src="/images/volunteer.png" alt="Icono Voluntario" style="width: 64px; height: 64px; margin-bottom: 15px;">
                    <div class="card-title">Voluntarios Activos</div>
                    <div class="card-value" th:text="${volunteersCount}">0</div>
                </div>
            </a>

            <a href="/refuges" style="text-decoration: none;">
                <div class="card">
                    <img src="/images/refuge.png" alt="Icono Refugio" style="width: 64px; height: 64px; margin-bottom: 15px;">
                    <div class="card-title">Zonas de Refugio</div>
                    <div class="card-value" th:text="${refugesCount}">0</div>
                </div>
            </a>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Refugio Patitas - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
