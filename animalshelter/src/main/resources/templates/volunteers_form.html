<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Voluntario</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 40px;">🐾</span>
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/animals">Animales</a>
            <a href="/volunteers" class="active">Voluntarios</a>
            <a href="/habitats">Hábitats</a>
        </div>

        <div class="form-container">
            <h1 style="margin-bottom: 25px; font-size: 1.75rem;">Detalles del Voluntario</h1>

            <form th:action="@{/volunteers/save}" th:object="${volunteer}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" th:field="*{name}" required placeholder="Ej. Carlos">
                </div>
                
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" th:field="*{email}" required placeholder="Ej. carlos@email.com">
                </div>
                
                <div class="form-group">
                    <label>Rol:</label>
                    <input type="text" th:field="*{role}" required placeholder="Ej. Cuidador">
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" th:field="*{active}">
                    <label>¿Está activo?</label>
                </div>

                <div class="form-actions">
                    <a href="/volunteers" class="btn btn-outline">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Voluntario</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
