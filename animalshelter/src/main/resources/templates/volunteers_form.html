<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Voluntario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"] { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        a { margin-left: 15px; color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>

    <h1>Detalles del Voluntario</h1>

    <form th:action="@{/volunteers/save}" th:object="${volunteer}" method="post">
        
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" th:field="*{name}" required placeholder="Ej. Carlos">
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" required placeholder="Ej. carlos@email.com">
        </div>
        
        <div class="form-group">
            <label>Rol:</label>
            <input type="text" th:field="*{role}" required placeholder="Ej. Cuidador">
        </div>
        
        <div class="form-group">
            <label>¿Está activo?:</label>
            <input type="checkbox" th:field="*{active}">
        </div>

        <button type="submit">Guardar Voluntario</button>
        <a href="/volunteers">Cancelar</a>
    </form>

</body>
</html>
