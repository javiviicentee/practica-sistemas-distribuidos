<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario del Refugio</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/animals">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/refuges" class="active">Refugios</a>
        </div>

        <div class="form-container">
            <h1 style="margin-bottom: 25px; font-size: 24px;">Detalles del Refugio</h1>

            <form th:action="@{/refuges/save}" th:object="${refuge}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" th:field="*{name}" required placeholder="Ej. Refugio Felino">
                </div>
                
                <div class="form-group">
                    <label>Tipo:</label>
                    <input type="text" th:field="*{type}" required placeholder="Ej. Interior">
                </div>
                
                <div class="form-group">
                    <label>Capacidad:</label>
                    <input type="number" th:field="*{capacity}" required min="0">
                </div>
                
                <hr style="margin: 20px 0; border: 1px solid #ddd;">

                <div class="form-group">
                    <label>Coordinador (Voluntario encargado):</label>
                    <select name="coordinatorId">
                        <option value="">-- Sin asignar --</option>
                        <option th:each="vol : ${volunteers}" 
                                th:value="${vol.id}" 
                                th:text="${vol.name}"
                                th:selected="${refuge.coordinator != null and refuge.coordinator.id == vol.id}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Animales alojados:</label>
                    <span th:if="${animals.empty}" style="color:red; font-size:14px;">No hay animales registrados.</span>
                    <div th:each="animal : ${animals}" style="margin-bottom: 5px;">
                        <input type="checkbox" name="animalIds" th:value="${animal.id}" 
                               th:checked="${refuge.animals != null and refuge.animals.contains(animal)}">
                        <label th:text="${animal.name} + ' (' + ${animal.displaySpecies} + ')'" style="display:inline; font-weight:normal;"></label>
                    </div>
                </div>

                <div class="form-actions">
                    <a href="/refuges" class="btn btn-outline">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar Refugio</button>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Refugio Patitas - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
