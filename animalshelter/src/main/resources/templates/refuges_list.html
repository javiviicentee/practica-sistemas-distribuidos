<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refugios - Listado</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/animals">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/refuges" class="active">Refugios</a>
        </div>

        <div class="page-header">
            <h1>Zonas de Refugio</h1>
            <a href="/refuges/new" class="btn btn-primary">+ Añadir Nuevo Refugio</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Capacidad</th>
                        <th>Estado</th>
                        <th>Coordinador</th>
                        <th>Animales</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="refuge : ${refuges}">
                        <td th:text="${refuge.id}">1</td>
                        <td th:text="${refuge.name}">Sabana</td>
                        <td th:text="${refuge.type}">Exterior</td>
                        <td><strong th:text="${refuge.capacity}">10</strong></td>
                        <td>
                            <span th:classappend="${refuge.available} ? 'status-badge yes' : 'status-badge no'"
                                  th:text="${refuge.available ? 'Disponible' : 'No Disponible'}">Sí</span>
                        </td>
                        <td th:text="${refuge.coordinator != null ? refuge.coordinator.name : 'Nadie'}">Juan</td>
                        <td>
                            <strong th:text="${refuge.animals != null ? refuge.animals.size() : 0}">0</strong> animales
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn btn-sm btn-outline" th:href="@{/refuges/edit/{id}(id=${refuge.id})}">Editar</a>
                                
                                <form th:action="@{/refuges/delete/{id}(id=${refuge.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                                </form>
                                
                                <form th:action="@{/refuges/{id}/toggle-availability(id=${refuge.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-warning">Disp.</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 Refugio Patitas - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
