<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refugio de Animales - Hábitats</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn { padding: 8px 15px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; }
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;}
        .btn-warning { background-color: #ffc107; color: black; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Hábitats en el Refugio</h1>
    
    <a href="/habitats/new" class="btn">+ Añadir Nuevo Hábitat</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Capacidad</th>
                <th>Disponible</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="habitat : ${habitats}">
                <td th:text="${habitat.id}">1</td>
                <td th:text="${habitat.name}">Sabana</td>
                <td th:text="${habitat.type}">Exterior</td>
                <td th:text="${habitat.capacity}">10</td>
                <td th:text="${habitat.available ? 'Sí' : 'No'}">Sí</td>
                <td>
                    <a th:href="@{/habitats/edit/{id}(id=${habitat.id})}">Editar</a> | 
                    
                    <form th:action="@{/habitats/delete/{id}(id=${habitat.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-danger">Borrar</button>
                    </form> |
                    
                    <form th:action="@{/habitats/{id}/toggle-availability(id=${habitat.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-warning">Cambiar Disponibilidad</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
