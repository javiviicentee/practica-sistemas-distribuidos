<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Refugio - Hábitats</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 40px;">🐾</span>
            <div>
                <h1 style="margin: 0; color: #0066cc;">Refugio Patitas</h1>
                <p style="margin: 0; color: #666666; font-size: 14px;">Panel de Administración</p>
            </div>
        </div>

        <div class="nav-links">
            <a href="/animals">Animales</a>
            <a href="/volunteers">Voluntarios</a>
            <a href="/habitats" class="active">Hábitats</a>
        </div>

        <div class="page-header">
            <h1>Hábitats en el Refugio</h1>
            <a href="/habitats/new" class="btn btn-primary">+ Añadir Nuevo Hábitat</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Capacidad</th>
                        <th>Estado</th>
                        <th>Coordinador</th>
                        <th>Animales</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="habitat : ${habitats}">
                        <td th:text="${habitat.id}">1</td>
                        <td th:text="${habitat.name}">Sabana</td>
                        <td th:text="${habitat.type}">Exterior</td>
                        <td><strong th:text="${habitat.capacity}">10</strong></td>
                        <td>
                            <span th:classappend="${habitat.available} ? 'status-badge yes' : 'status-badge no'"
                                  th:text="${habitat.available ? 'Disponible' : 'No Disponible'}">Sí</span>
                        </td>
                        <td th:text="${habitat.coordinator != null ? habitat.coordinator.name : 'Nadie'}">Juan</td>
                        <td>
                            <strong th:text="${habitat.animals != null ? habitat.animals.size() : 0}">0</strong> animales
                        </td>
                        <td>
                            <div class="action-buttons">
                                <a class="btn btn-sm btn-outline" th:href="@{/habitats/edit/{id}(id=${habitat.id})}">Editar</a>
                                
                                <form th:action="@{/habitats/delete/{id}(id=${habitat.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger">Borrar</button>
                                </form>
                                
                                <form th:action="@{/habitats/{id}/toggle-availability(id=${habitat.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-warning">Disp.</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
